<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Quiz App</h1>

        <h2 id="question">
            What does HTML stand for?

        <div class="buttons">
           
            <button id="next">Next</button>
        </div>

    </div>

</body>
</html>
